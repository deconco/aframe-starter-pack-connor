<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
  </head>
  <body>
    <a-scene>

      <a-assets>

        <a-asset-item id="myModel" src="assets/teddybear_2024.obj"></a-asset-item>
        <a-asset-item id="house" src="assets/House.stl.obj"></a-asset-item>
        <a-asset-item id="plant1" src="assets/plant1.stl.obj"></a-asset-item>
        <a-asset-item id="plant2" src="assets/plant2.stl.obj"></a-asset-item>
        <a-asset-item id="plant3" src="assets/plant3.stl.obj"></a-asset-item>
        <a-asset-item id="plant4" src="assets/plant4.stl.obj"></a-asset-item>
        <a-asset-item id="plant5" src="assets/plant5.stl.obj"></a-asset-item>
        <a-asset-item id="crystal1" src="assets/crystal.stl.obj"></a-asset-item>
        <a-asset-item id="crystal2" src="assets/crystal.stl.obj"></a-asset-item>
        <img id="forest" src="assets/forest.jpg">
        <img id="leaf" src="assets/leaf.jpg">
        <img id="grass" src="assets/grass.jpg">
        <img id="vines" src="assets/vines.jpeg">
        <img id="fairies" src="assets/fairybg.jpg">
    
      </a-assets>
    
      <a-obj-model src="#myModel" position="-1 -1 -2.3" scale="0.16 0.16 0.16"  width="4" height="4" material="shader:flat;src:#leaf"></a-obj-model>
      <a-obj-model src="#house" position="0 -0.005 -3.741" scale="1.9 1.7 1.9" rotation="270 0 0"></a-obj-model>
      <a-obj-model src="#plant1" position="-1.9 0.008 -2.928" scale="0.03 0.03 0.03" rotation="270 0 0" color="#0b7000"></a-obj-model>
      <a-obj-model src="#plant2" position=".5 0 -3.1" scale="0.03 0.03 0.03" rotation="270 0 0" color="#12b300"></a-obj-model>
      <a-obj-model src="#plant3" position=".5 0 -3" scale="0.03 0.03 0.03" rotation="270 0 0" color="#0b7000"></a-obj-model>
      <a-obj-model></a-obj-model>
      <a-obj-model></a-obj-model>
      <a-obj-model></a-obj-model>
      <a-obj-model></a-obj-model>
      <a-sphere position="-2 4 -5" scale="0.1 0.1 0.1" opacity="0.7" color="#f3b3cf" animation="property: position; to: -2 4.3 -5; dur: 2000; loop: true; dir: alternate"></a-animation></a-sphere>
      <a-sphere position="2 4 -5" scale="0.1 0.1 0.1" opacity="0.7" color="#f3b3cf" animation="property: position; to: 2 4.3 -5; dur: 2000; loop: true; dir: alternate"></a-animation></a-sphere>
      <a-sphere position="3 4 -5" scale="0.1 0.1 0.1" opacity="0.7" color="#f3b3cf" animation="property: position; to: 3 4.3 -5; dur: 2000; loop: true; dir: alternate"></a-animation></a-sphere>
      <a-sphere position="4 4 -5" scale="0.15 0.15 0.15" opacity="0.7" color="#f3b3cf" animation="property: position; to: 4 4.3 -5; dur: 2000; loop: true; dir: alternate"></a-animation></a-sphere>
      <a-sphere position="-3 4 -3" scale="0.1 0.1 0.1" opacity="0.7" color="#f3b3cf" animation="property: position; to: -3 4.3 -3; dur: 2000; loop: true; dir: alternate"></a-animation></a-sphere>
      
      <!--
        <a-box position="-1 0.5 -3" rotation="0 45 0" color="#4CC3D9"></a-box>
      <a-sphere position="0 1.25 -5" radius="1.25" color="#EF2D5E"></a-sphere>
      <a-cylinder position="1 0.75 -3" radius="0.5" height="1.5" color="#FFC65D"></a-cylinder>
      -->
      <a-plane src="#grass" position="0 0 -4" rotation="-90 0 0" width="30" height="30" repeat="10 10"></a-plane>
      <a-sky src="#fairies"></a-sky>


      
    </a-scene>
  </body>
</html>
