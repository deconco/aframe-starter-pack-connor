<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
    <script src="https://unpkg.com/aframe-environment-component/dist/aframe-environment-component.min.js"></script>
 
  </head>
  <body>
    <a-scene>
      <a-assets>
        <img id="towel" src="assets/towel-texture.jpg">
        <img id="icecream" src="assets/icecream-texture.jpg">
        <img id="strawberry" src="assets/strawberry.jpg">
        <img id="choco" src="assets/choco.jpg">
        <img id="background" src="assets/beach2.jpg">
        <img id="cone" src="assets/waffle.jpg">
        <img id="sand" src="assets/sand.jpeg">
        <img id="fabric" src="assets/fabric.jpeg">
      </a-assets>

      <!-- <a-box position="-1 0.5 -3" rotation="0 45 0" color="#4CC3D9"></a-box> !-->
       <a-sphere position="0 1.847 -5" radius="0.25" src="#icecream"></a-sphere>
       <a-sphere position="0 2.25 -5" radius="0.25" src="#choco"></a-sphere>
       <a-sphere position="0 2.643 -5" radius="0.25" src="#strawberry"></a-sphere>
       <a-cone position="0 1.22 -5" scale="0.2 0.9 0.2" radius="0.4" rotation="180 0 0" src="#cone"></a-cone>
       
       <a-box position="-3.2 .15 -4.5" scale="1.5 1 0.7" src="#sand"></a-box>
       <a-box position="-3.8 .8 -4.5" scale="0.3 0.3 0.7" src="#sand"></a-box>
       <a-box position="-2.6 .8 -4.5" scale="0.3 0.3 0.7" src="#sand"></a-box>
       <a-box position="-3.2 .8 -4.5" scale="0.3 0.3 0.7" src="#sand"></a-box>
       <a-cylinder position="-3.2 1.2 -4.5" scale="0.02 1 0.02" color="white"></a-cylinder>
       <a-triangle position="-2.95 1.45 -4.5" scale="0.5 0.5 0.5" rotation="0 0 270" color="red" src="#fabric"></a-triangle>
       
      <!-- <a-cylinder position="1 0.75 -3" radius="0.5" height="1.5" color="#FFC65D"></a-cylinder>  !-->
      <a-plane position="0 0.001 -4" rotation="-90 0 0" width="4" height="4" src="#towel"></a-plane>

      <a-entity environment="preset: egypt; dressing: none; skyType: gradient; skyColor: #a6efff; horizonColor: #ff9d3b; ground: flat; groundColor: #dbb78f; groundColor2: #c7a57d; groundTexture: walkernoise; fog: 0.7; dressingAmount: 20"></a-entity>
      <!-- <a-sky src="#background" color="#ECECEC" radius="10"></a-sky> !-->
    </a-scene>
  </body>
